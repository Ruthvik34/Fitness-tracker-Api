version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fitness
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: fitness-tracker
    container_name: fitness-app
    ports:
      - "8080:8080"
    environment:
      # Spring will read these environment variables via application.properties
      DB_URL: jdbc:postgresql://db:5432/fitness
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
